bridge_backend: mock

app:
  log_level: INFO
  save_logs: true

training:
  training_mode: true
  evaluation_mode: false
  checkpoint_frequency: 10
  max_run_duration_minutes: 60
  auto_restart_delay_seconds: 2

policy:
  max_colonists: 6
  failure_threshold: 0.7
  exploration: 0.1
  learning_rate: 0.001
  colony_strategy_focus: survival
  min_food_reserve: 20
  min_medicine_reserve: 5
  acceptable_injury_threshold: 0.4
  combat_stance: balanced

failure:
  progress_window_steps: 4
  min_progress_delta: 0.04
  starvation_signal_threshold: 0.7
  medical_signal_threshold: 0.75
  mood_signal_threshold: 0.75
  injury_signal_threshold: 0.7
  resource_signal_threshold: 0.7
  high_risk_signal_threshold: 0.8
  weights:
    all_colonists_incapacitated: 2.0
    starvation: 1.4
    medical_collapse: 1.2
    mood_collapse: 1.0
    severe_injury_burden: 1.0
    stalled_progress: 0.8
    severe_resource_depletion: 0.8
    high_failure_risk: 1.2

backends:
  rimapi:
    base_url: http://127.0.0.1:8000
    timeout_seconds: 10
  rimbridge:
    base_url: http://127.0.0.1:8765
    timeout_seconds: 10
